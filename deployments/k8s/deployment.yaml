apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusai-gateway
  namespace: nexusai
  labels:
    app.kubernetes.io/name: nexusai-gateway
    app.kubernetes.io/part-of: nexusai-ecosystem
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nexusai-gateway
  template:
    metadata:
      labels:
        app: nexusai-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: gateway
          image: ghcr.io/thomasvnn/nexusai-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 20129
              name: http
          envFrom:
            - configMapRef:
                name: nexusai-gateway-config
            - secretRef:
                name: nexusai-gateway-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
