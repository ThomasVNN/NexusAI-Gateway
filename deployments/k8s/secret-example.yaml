apiVersion: v1
kind: Secret
metadata:
  name: nexusai-gateway-secret
  namespace: nexusai
  labels:
    app.kubernetes.io/name: nexusai-gateway
    app.kubernetes.io/part-of: nexusai-ecosystem
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:postgres_secure_pass@postgres-nexus.nexusai.svc.cluster.local:5432/nexusai_gateway?sslmode=disable"
  INITIAL_PASSWORD: "postgres_secure_pass"
