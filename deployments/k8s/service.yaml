apiVersion: v1
kind: Service
metadata:
  name: nexusai-gateway
  namespace: nexusai
  labels:
    app.kubernetes.io/name: nexusai-gateway
    app.kubernetes.io/part-of: nexusai-ecosystem
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 20129
      protocol: TCP
      name: http
  selector:
    app: nexusai-gateway
