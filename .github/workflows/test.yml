name: Test Suite

on:
  push:
    branches: [ main, feature/*, fix/*, chore/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5435
  POSTGRES_DB: nexusai_local
  POSTGRES_USER: dev_local_user
  POSTGRES_PASSWORD: dev_local_password

jobs:
  # H-Rule Validation: H11 Quality Requirements
  test:
    name: Go Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            **/go.sum

      - name: Run H26 Pre-flight: Check Branch Naming
        run: |
          branch=$(git rev-parse --abbrev-ref HEAD)
          echo "Current branch: $branch"
          if [[ ! "$branch" =~ ^(main|feature/|fix/|chore/|refactor/|hotfix/)[A-Z]+-[0-9]+ ]]; then
            echo "ERROR: Branch '$branch' does not follow naming convention"
            echo "Expected: feature/TICKET-description, fix/TICKET-description, etc."
            exit 1
          fi
          echo "Branch naming: PASS"

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5435 -U ${{ env.POSTGRES_USER }} 2>/dev/null; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Run H2/H26 Pre-flight: Database Validation
        run: |
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -h localhost -p 5435 -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} -c "SELECT COUNT(*) as backlog_items FROM backlog_items;"
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -h localhost -p 5435 -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} -c "SELECT COUNT(*) as allocation_decisions FROM allocation_decisions;"

      - name: Cache Go Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Dependencies
        run: go mod download

      - name: Run H11 Unit Tests with Coverage
        run: |
          echo "Running unit tests with race detector..."
          go test -v -race -coverprofile=coverage.out -covermode=atomic \
            -coverpkg=./internal/... \
            ./internal/resilience/... \
            ./internal/provider/... \
            ./internal/routing/...

      - name: Check Test Coverage
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: $coverage%"
          if (( $(echo "$coverage < 70" | bc -l) )); then
            echo "ERROR: Test coverage $coverage% is below H11 threshold of 70%"
            exit 1
          fi
          echo "Coverage $coverage% meets H11 requirement"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage-${{ github.run_number }}
          path: coverage.out
          retention-days: 30

      - name: Generate Test Evidence
        run: |
          cat > test-evidence.json << 'EOF'
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow": "NexusAI-Gateway CI",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "test_results": {
              "status": "passed",
              "coverage_required": 70,
              "coverage_achieved": "dynamic"
            },
            "h_rules_verified": ["H2", "H10", "H11", "H26"]
          }
          EOF
          echo "Test evidence generated"

  # Build verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Gateway
        run: |
          echo "Building NexusAI-Gateway..."
          go build -v -o bin/gateway ./cmd/gateway
          go build -v -o bin/cli ./cmd/cli
          echo "Build successful"

      - name: Build Docker Image
        run: |
          echo "Building Docker image..."
          docker build -t nexusai-gateway:test \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%d) \
            --build-arg VCS_REF=$(git rev-parse --short HEAD) \
            .
          echo "Docker build successful"

      - name: Upload Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gateway-binaries-${{ github.run_number }}
          path: bin/
          retention-days: 7

  # E2E Tests (stub - requires actual test files)
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run E2E Tests (Placeholder)
        run: |
          echo "E2E tests would run here"
          echo "Requires actual test files in ./e2e/ directory"
          echo "Current status: STUB - No E2E tests implemented"

      - name: Generate E2E Evidence
        run: |
          echo '{"e2e_status": "stub", "message": "E2E tests not yet implemented"}' > e2e-evidence.json
